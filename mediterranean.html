<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTIDOM | Mediterranean Soft-Min</title>
    <style>
        :root {
            --bg: #fdfaf5; /* Sand/Parchment */
            --text: #2d2a26;
            --accent: #7a826e; /* Olive */
            --muted: #e5e0d8;
            --font-main: 'Outfit', sans-serif;
            --font-display: 'Cormorant Garamond', serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            margin: 0;
            line-height: 1.7;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 4rem;
        }
        header {
            padding: 3rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-style: italic;
            font-weight: 300;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 3rem;
            font-size: 1rem;
            font-weight: 300;
            text-transform: lowercase;
            transition: 0.4s;
        }
        nav a:hover { color: var(--accent); }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 8vh 0;
        }
        .hero-label {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.75rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }
        .hero h1 {
            font-family: var(--font-display);
            font-size: 6rem;
            line-height: 1;
            margin: 0;
            font-weight: 300;
            max-width: 900px;
        }
        .hero p {
            font-size: 1.4rem;
            max-width: 600px;
            margin: 2rem 0;
            font-weight: 300;
            opacity: 0.8;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            grid-template-rows: 400px 400px;
            gap: 1.5rem;
            margin-top: 4rem;
            width: 100%;
        }
        .bento-item {
            background: var(--muted);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            transition: 0.6s ease;
        }
        .bento-item:hover { transform: translateY(-5px); }
        .bento-item.tall { grid-row: span 2; }
        .cta-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-top: 2rem;
            font-size: 0.9rem;
            transition: 0.5s;
        }
        .cta-circle:hover { transform: rotate(15deg) scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Artidom</div>
            <nav>
                <a href="#">estates</a>
                <a href="#">furnishing</a>
                <a href="#">atelier</a>
                <a href="#">story</a>
            </nav>
        </header>

        <section class="hero">
            <span class="hero-label">Montenegro Luxury Furnishing</span>
            <h1>The Art of Slow Hospitality</h1>
            <p>We create sensory environments for premium hotels and coastal restaurants. Craftsmanship redefined.</p>
            <a href="#" class="cta-circle">Start Project</a>

            <div class="bento-grid">
                <div class="bento-item tall"></div>
                <div class="bento-item"></div>
                <div class="bento-item"></div>
            </div>
        </section>
    </div>
</body>
</html>
